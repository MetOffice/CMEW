---
# Fake destination directory
output_dir: /fake/output/dir

# Data filepath structures
projects:
  ESMVal:
    data:
      local:
        type: data_type
        rootpath: /fake/workflow/share/work/GCModelDev
        dirname_template: "{dirname}/{1}"
        filename_template: "{filename}_{1}*.nc"
  CMIP6:
    data:
      local:
        type: data_type
        rootpath: /fake/cmip6/data
        dirname_template: "{dirname}/{2}"
        filename_template: "{filename}_{2}*.nc"
  OBS:
    data:
      local:
        type: data_type
        rootpath: /fake/obs/data
        dirname_template: "{dirname}/{3}"
        filename_template: "{filename}_{3}*.nc"
  Obs4MIPS:
    data:
      local:
        type: edata_type
        rootpath: /fake/obs4mips/data
        dirname_template: "{dirname}/{3}"
        filename_template: "{filename}_{3}*.nc"

# This is overwritten by the environment variable
max_parallel_tasks: '99'

# Static section
other_key: some_value