# Note the deliberate use of "--out-dir $OUTPUT_DIR", this needs a proper fix
#  through aa_run_area which currently auto adds the experiment ids.
[command]
default=cmew-esmvaltool-env aa_run_area    \
       = --area $AREA                      \
       = --start-date $START_DATE          \
       = --end-date $END_DATE              \
       = --suite-id1 $REF_SUITE_ID         \
       = --suite-id2 $SUITE_ID             \
       = --suite-title1 '$REF_SUITE_TITLE' \
       = --suite-title2 '$SUITE_TITLE'     \
       = --out-dir $OUTPUT_DIR             \
       = --data-dir $AUTOASSESS_DATA_DIR   \
       = --obs-dir $OBS_CLIM_PATH          \
       = --tmp-dir $CYLC_TASK_WORK_DIR     \
       = --ancil-dir $ANCIL_PATH
