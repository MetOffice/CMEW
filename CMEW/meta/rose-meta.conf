[namelist:cmip6_datasets]
duplicate=true

[namelist:cmip6_datasets=experiment_id]
compulsory=true
description=The experiment ID of the dataset.
help=For example, 'historical', 'piControl' or 'abrupt4xco2'.
sort-key=3
type=quoted

[namelist:cmip6_datasets=grid]
compulsory=true
description=Whether the data is on the native grid of the model.
help=This will either be 'gn' for native grid or 'gr' for regridded.
sort-key=5
values="gn","gr"

[namelist:cmip6_datasets=institute]
compulsory=true
description=The institute that produced the dataset.
help=For example, 'MOHC' or 'EC-Earth-Consortium'.
sort-key=2
type=quoted

[namelist:cmip6_datasets=label_for_plots]
compulsory=false
description=A label to use on plots for this dataset.
help=It is recommended to limit the length of this string as much as is
    =practical for better readability in plots.
    =The Rose GUI will enforce a maximum length of 25 characters.
    =Not all diagnostics make use of this variable.
    =It may be set to the same value as 'dataset'.
pattern=^".{0,25}"$
sort-key=6
type=quoted

[namelist:cmip6_datasets=model_id]
compulsory=true
description=The 'source_id' of the CMIP6 dataset.
help=For example, 'UKESM1-0-LL' or 'ACCESS-ESM1-5'.
sort-key=1
type=quoted

[namelist:cmip6_datasets=variant_label]
compulsory=true
description=Also known as 'ensemble'.
help=Must adhere to CMIP6 variant label format: r<int>i<int>p<int>f<int>.
    =For example, 'r2i1p1f3'. https://help.ceda.ac.uk/article/4801-cmip6-data
pattern=^"r[0-9]+i[0-9]+p[0-9]+f[0-9]+"$
sort-key=4
type=quoted

[namelist:model_runs]
duplicate=true

[namelist:model_runs=calendar]
compulsory=true
description=The calendar used by the run.
help=Only 'gregorian' and '360_day' are currently supported.
sort-key=6
values="gregorian","360_day"

[namelist:model_runs=experiment_id]
compulsory=true
description=The experiment ID of the model run.
help=For example, 'historical', 'piControl' or 'abrupt4xco2'.
sort-key=3
type=quoted

[namelist:model_runs=label_for_plots]
compulsory=false
description=An 'alias' for the dataset in the ESMValTool recipe.
help=It is recommended to limit the length of this string as much as is
    =practical for better readability in plots.
    =The Rose GUI will enforce a maximum length of 25 characters.
    =Not all diagnostics make use of this variable.
    =It may be set to the same value as SUITE_ID or MODEL_ID.
pattern=^".{0,25}"$
sort-key=4
type=quoted

[namelist:model_runs=model_id]
compulsory=true
description=The base model on which the development run is based.
           =For example, 'HadGEM3-GC5E-LL'.
help=Must only contain letters, numbers, underscores or dashes.
pattern=^"[a-zA-Z0-9_-]+"$
sort-key=2
type=quoted

[namelist:model_runs=suite_id]
compulsory=true
description=The suite ID of the run to retrieve from MASS.
help=For example, 'u-bv526'.
pattern=^"[a-zA-Z0-9_-]+"$
sort-key=1
type=quoted

[namelist:model_runs=variant_label]
compulsory=true
description=Also known as 'ensemble member'.
help=Must adhere to CMIP6 variant label format: r<int>i<int>p<int>f<int>.
    =For example, 'r2i1p1f3'. https://help.ceda.ac.uk/article/4801-cmip6-data
pattern=^"r[0-9]+i[0-9]+p[0-9]+f[0-9]+"$
sort-key=5
type=quoted

[template variables=AUTOASSESS]
compulsory=true
description=Run the AutoAssess area assessments
ns=AutoAssess
sort-key=01
trigger=template variables=AUTOASSESS_TITLE: true;
type=boolean

[template variables=AUTOASSESS_TITLE]
compulsory=true
description=Descriptive title for this assessment.
           =The title will be used on all AutoAssess html pages.
ns=AutoAssess
sort-key=02

[template variables=CDDS_VERSION]
compulsory=false
description=The version of CDDS to use when running the standardise workflow.
help=This value must be set in a site-specific configuration file located in
    =the 'opt/' directory.
type=quoted

[template variables=DRS_CMIP6]
description=The Data Reference Syntax (DRS) to use when specifying the
           =directory structure for CMIP6 data.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory.
type=quoted

[template variables=DRS_OBS4MIPS]
description=The Data Reference Syntax (DRS) to use when specifying the
           =directory structure for obs4MIPs data.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory.
type=quoted

[template variables=ESMVALTOOL_MODULE_NAME]
compulsory=false
description=The name of the modulefile used to setup the ESMValTool environment
           =for CMEW via the 'module load' command.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory. Otherwise, set the value equal to an
    =empty string.
type=quoted

[template variables=MAX_PARALLEL_TASKS]
compulsory=true
description=The number of tasks (within a single call to ESMValTool) to run in
           =parallel when running ESMValTool.
help=To override the default value for a specific site, define the override
    =value in a site-specific configuration file located in the 'opt/'
    =directory.
type=integer

[template variables=MIP_TABLE_DIR]
description=Path to MIP table directory.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory. Otherwise, set the value equal to an
    =empty string.
type=quoted

[template variables=NUMBER_OF_YEARS]
compulsory=true
description=The number of years of model data to evaluate.
help=Data evaluated will end on 31 December START_YEAR + NUMBER_OF_YEARS -1,
    =inclusive.
sort-key=24
type=integer

[template variables=RAW_DATA_DIR]
compulsory=false
description=The directory to save raw model data to,
           =or to read raw model data from.
help=If "save_new" is selected in RAW_DATA_DIR_MODE,
    =the relevant raw data will be copied to the specified directory,
    =into subdirectories named with the relevant stream.
    =If "use_saved" is selected,
    =CMEW will require all necessary raw data to be in the directory,
    =in subdirectories named with the correct stream.
sort-key=26
type=quoted

[template variables=RAW_DATA_DIR_MODE]
compulsory=true
description=Whether to save raw model data to,
           =or read raw model data from, an external directory.
help=If either 'Save new data' or 'Use saved data' is selected,
    =specify the directory with RAW_DATA_DIR,
    =e.g. RAW_DATA_DIR="$SCRATCH/raw_data".
sort-key=25
trigger=template variables=RAW_DATA_DIR: "save_new", "use_saved"
value-titles="None", "Save new data", "Use saved data"
values="off", "save_new", "use_saved"

[template variables=ROOTPATH_CMIP6]
description=The root path to the input CMIP6 data.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory.
type=quoted

[template variables=ROOTPATH_OBS4MIPS]
description=The root path to the input obs4MIPs data.
help=If required, this value must be set in a site-specific configuration file
    =located in the 'opt/' directory.
type=quoted

[template variables=SITE]
description=The site at which the Rose suite will run.
help=This value must be set in a site-specific configuration file located in
    =the 'opt/' directory.
type=quoted

[template variables=START_YEAR]
compulsory=true
description=The first year of model data to evaluate.
help=Data evaluated will begin on 1 Jan START_YEAR.
sort-key=24
type=integer
